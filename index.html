<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<title>我的星球 · 小王子账本</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  /* ── Official Le Petit Prince palette ── */
  --pp-blue:    #2850A0;   /* Prince's coat, star sky */
  --pp-gold:    #E6BE5A;   /* wheat field, fox, stars */
  --pp-rose:    #D25064;   /* the rose */
  --pp-purple:  #8C78B4;   /* star sky, mystery */
  --pp-fox:     #E6C280;   /* fox warm gold */
  --pp-pilot:   #C5A384;   /* pilot, sand, desert */
  --pp-blush:   #E87A90;   /* rose blush */
  --pp-sky:     #B8CEEC;   /* Pantone 290U galaxy pink-blue */

  /* ── Derived tokens ── */
  --night:  #f4f0f8;       /* base bg: very light lavender */
  --card:   #fffcfe;
  --card2:  #f0eaf8;
  --border:  rgba(140,120,180,0.15);
  --border2: rgba(140,120,180,0.28);
  --text:   #1e1830;
  --text2:  #5a4e7a;
  --text3:  #9a8eb8;
  --gold:   #E6BE5A;
  --gold2:  #f0d080;
  --rose:   #D25064;
  --rose2:  #e87a90;
  --star:   #E6BE5A;
  --green:  #3a7850;
  --blue:   #2850A0;
  --radius: 16px;
  --radius-sm: 10px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Noto Serif SC', 'EB Garamond', serif;
  background: var(--night);
  color: var(--text);
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  overflow-x: hidden;
  position: relative;
}

/* STARS BACKGROUND */
.stars-bg {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.star-dot {
  position: absolute;
  border-radius: 50%;
  background: #E6BE5A;
  animation: twinkle var(--dur, 3s) ease-in-out infinite;
  animation-delay: var(--delay, 0s);
}
@keyframes twinkle {
  0%, 100% { opacity: var(--min-op, 0.1); transform: scale(1); }
  50% { opacity: var(--max-op, 0.6); transform: scale(1.2); }
}

/* PLANET DECORATION */
.planet-deco {
  position: fixed;
  bottom: -60px;
  right: -60px;
  width: 200px;
  height: 200px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #4878c8, #2850A0);
  border: 2px solid rgba(184,32,48,0.25);
  pointer-events: none;
  z-index: 0;
  box-shadow: inset -20px -20px 40px rgba(160,80,0,0.2), 0 0 60px rgba(200,150,0,0.15);
}

/* CONTENT WRAPPER */
.content { position: relative; z-index: 1; }

/* HEADER */
.header {
  padding: 20px 20px 16px;
  background: linear-gradient(180deg, rgba(253,240,224,0.98) 0%, rgba(253,240,224,0.92) 100%);
  backdrop-filter: blur(20px);
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 1px solid var(--border2);
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.app-name {
  display: flex;
  flex-direction: column;
}

.app-title {
  font-family: 'EB Garamond', serif;
  font-size: 22px;
  font-style: italic;
  color: #2850A0;
  letter-spacing: 0.02em;
  line-height: 1;
}

.app-subtitle {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-top: 3px;
}

.header-date {
  font-size: 12px;
  color: var(--text3);
  text-align: right;
  line-height: 1.5;
}

/* NAV */
.nav {
  display: flex;
  gap: 4px;
  background: rgba(160,80,30,0.06);
  border-radius: 12px;
  padding: 4px;
}

.nav-btn {
  flex: 1;
  padding: 7px 4px;
  border-radius: 9px;
  font-size: 12px;
  color: var(--text3);
  cursor: pointer;
  text-align: center;
  transition: all 0.25s;
  font-family: 'Noto Serif SC', serif;
  border: none;
  background: transparent;
  letter-spacing: 0.02em;
}

.nav-btn.active {
  background: var(--rose);
  color: #fff;
  border: 1px solid rgba(184,32,48,0.3);
}

/* SECTIONS */
.section { display: none; padding: 16px 16px 100px; }
.section.active { display: block; }

/* ===== OVERVIEW ===== */
.overview-hero {
  background: linear-gradient(135deg, #ffecd0 0%, #ffd8b0 100%);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 14px;
  position: relative;
  overflow: hidden;
}

.overview-hero::before {
  content: '✦';
  position: absolute;
  top: 16px;
  right: 20px;
  font-size: 32px;
  color: rgba(184,32,48,0.15);
}

.overview-label {
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.overview-month {
  font-family: 'EB Garamond', serif;
  font-size: 15px;
  color: var(--text2);
  margin-bottom: 10px;
  font-style: italic;
}

.overview-net {
  font-family: 'EB Garamond', serif;
  font-size: 44px;
  color: var(--text);
  line-height: 1;
  margin-bottom: 6px;
}

.overview-net span { font-size: 22px; color: var(--text2); }

.overview-net.positive { color: var(--green); }
.overview-net.negative { color: var(--rose); }

.overview-stats {
  display: flex;
  gap: 10px;
  margin-top: 16px;
}

.stat-pill {
  flex: 1;
  background: rgba(160,80,30,0.06);
  border-radius: 10px;
  padding: 10px 12px;
  border: 1px solid var(--border);
}

.stat-pill-label { font-size: 10px; color: var(--text3); margin-bottom: 4px; letter-spacing: 0.08em; }
.stat-pill-value { font-family: 'EB Garamond', serif; font-size: 18px; }
.stat-pill-value.inc { color: var(--green); }
.stat-pill-value.exp { color: var(--rose); }

/* SECTION TITLE */
.section-title {
  font-family: 'EB Garamond', serif;
  font-size: 14px;
  font-style: italic;
  color: #2850A0;
  letter-spacing: 0.05em;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ACCOUNTS GRID */
.accounts-scroll {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 4px;
  margin-bottom: 14px;
}
.accounts-scroll::-webkit-scrollbar { display: none; }

.account-chip {
  flex-shrink: 0;
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 12px 16px;
  min-width: 130px;
  position: relative;
  overflow: hidden;
}

.account-chip::after {
  content: '';
  position: absolute;
  bottom: -15px;
  right: -15px;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: rgba(192,120,8,0.06);
}

.account-chip-type {
  font-size: 9px;
  color: var(--text3);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.account-chip-name {
  font-size: 13px;
  color: var(--text);
  margin-bottom: 8px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.account-chip-balance {
  font-family: 'EB Garamond', serif;
  font-size: 20px;
}
.account-chip-balance.pos { color: var(--green); }
.account-chip-balance.neg { color: var(--rose); }
.account-chip-balance.zero { color: var(--text3); }

/* BUDGET CARDS */
.budget-cards {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 14px;
}

.budget-card {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
}

.budget-card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 10px;
}

.budget-card-name { font-size: 14px; color: var(--text); }
.budget-card-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }

.budget-card-amounts {
  text-align: right;
}

.budget-card-spent {
  font-family: 'EB Garamond', serif;
  font-size: 18px;
  color: var(--text);
}

.budget-card-total {
  font-size: 11px;
  color: var(--text3);
}

.budget-track {
  height: 5px;
  background: rgba(255,255,255,0.06);
  border-radius: 3px;
  overflow: hidden;
}

.budget-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
}

.budget-fill.safe { background: linear-gradient(90deg, #2e6e3e, #60b870); }
.budget-fill.warn { background: linear-gradient(90deg, #c07808, #e09a18); }
.budget-fill.over { background: linear-gradient(90deg, var(--rose), var(--rose2)); }

/* RECENT TXS */
.tx-list { display: flex; flex-direction: column; gap: 6px; }

.tx-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: border-color 0.2s;
}
.tx-item:hover { border-color: var(--border2); }

.tx-icon {
  width: 36px;
  height: 36px;
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.tx-body { flex: 1; min-width: 0; }
.tx-note { font-size: 14px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tx-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }

.tx-right { text-align: right; flex-shrink: 0; }
.tx-amount { font-family: 'EB Garamond', serif; font-size: 17px; }
.tx-amount.exp { color: var(--rose); }
.tx-amount.inc { color: var(--green); }
.tx-amount.trf { color: var(--blue); }
.tx-amount.pay { color: var(--gold); }

.tx-del {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: transparent;
  border: none;
  color: var(--text3);
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
.tx-del:hover { background: rgba(232,112,138,0.15); color: var(--rose); }

.date-divider {
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.1em;
  padding: 8px 2px 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.date-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ===== ADD/INCOME FORM ===== */
.form-card {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 14px;
}

.form-card-title {
  font-family: 'EB Garamond', serif;
  font-size: 17px;
  font-style: italic;
  color: var(--gold);
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.form-group { margin-bottom: 14px; }

.form-label {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 6px;
  display: block;
}

.form-input, .form-select {
  width: 100%;
  background: var(--card2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 15px;
  padding: 11px 14px;
  font-family: 'Noto Serif SC', serif;
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
.form-input:focus, .form-select:focus { border-color: rgba(40,80,160,0.45); }
.form-select option { background: #1c1c38; }

.amount-wrap { position: relative; }
.amount-symbol {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 14px;
  pointer-events: none;
}
.amount-wrap .form-input {
  padding-left: 28px;
  font-family: 'EB Garamond', serif;
  font-size: 22px;
}

.form-row { display: flex; gap: 10px; }
.form-row .form-group { flex: 1; }

/* CATEGORY PILLS */
.cat-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  margin-bottom: 14px;
}

.cat-pill {
  padding: 7px 13px;
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
  border: 1px solid var(--border2);
  color: var(--text2);
  background: var(--card2);
  transition: all 0.2s;
  font-family: 'Noto Serif SC', serif;
}
.cat-pill.active {
  background: rgba(232,201,106,0.12);
  border-color: rgba(232,201,106,0.4);
  color: var(--rose);
}

/* TYPE TOGGLE */
.type-row {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}

.type-pill {
  flex: 1;
  padding: 9px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  cursor: pointer;
  border: 1px solid var(--border2);
  color: var(--text3);
  background: var(--card2);
  text-align: center;
  transition: all 0.2s;
  font-family: 'Noto Serif SC', serif;
}
.type-pill.active.expense { background: rgba(232,112,138,0.15); color: var(--rose); border-color: rgba(232,112,138,0.3); }
.type-pill.active.transfer { background: rgba(112,144,224,0.15); color: var(--blue); border-color: rgba(112,144,224,0.3); }
.type-pill.active.payment { background: rgba(232,201,106,0.12); color: var(--gold); border-color: rgba(232,201,106,0.3); }

/* SUBMIT BTN */
.submit-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #2850A0, #4878c8);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Noto Serif SC', serif;
  transition: all 0.2s;
  letter-spacing: 0.05em;
}
.submit-btn:active { transform: scale(0.98); opacity: 0.9; }

.secondary-btn {
  width: 100%;
  padding: 12px;
  background: transparent;
  color: var(--text2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  font-size: 13px;
  cursor: pointer;
  font-family: 'Noto Serif SC', serif;
  transition: all 0.2s;
  margin-top: 8px;
}
.secondary-btn:hover { border-color: rgba(40,80,160,0.35); color: #2850A0; }

/* ===== ACCOUNTS PAGE ===== */
.accounts-full-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}

.account-full-card {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 16px;
  position: relative;
  overflow: hidden;
}
.account-full-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(184,32,48,0.35), transparent);
}

.acc-full-type { font-size: 9px; color: var(--text3); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; }
.acc-full-name { font-size: 13px; color: var(--text); margin-bottom: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.acc-full-balance { font-family: 'EB Garamond', serif; font-size: 22px; margin-bottom: 12px; }
.acc-full-balance.pos { color: var(--green); }
.acc-full-balance.neg { color: var(--rose); }
.acc-full-balance.zero { color: var(--text3); }

.acc-edit-btn {
  width: 100%;
  padding: 7px;
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--text2);
  font-size: 11px;
  cursor: pointer;
  font-family: 'Noto Serif SC', serif;
  transition: all 0.2s;
  text-align: center;
}
.acc-edit-btn:hover { border-color: rgba(40,80,160,0.35); color: #2850A0; }

/* ===== REPORT ===== */
.report-month-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.month-nav-btn {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--card);
  border: 1px solid var(--border2);
  color: var(--text2);
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.month-nav-btn:hover { border-color: rgba(40,80,160,0.35); color: #2850A0; }
.month-label {
  font-family: 'EB Garamond', serif;
  font-size: 18px;
  font-style: italic;
  color: var(--rose);
}

.report-summary-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}

.report-stat-card {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 16px;
}
.report-stat-label { font-size: 10px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
.report-stat-value { font-family: 'EB Garamond', serif; font-size: 26px; }
.report-stat-value.inc { color: var(--green); }
.report-stat-value.exp { color: var(--rose); }
.report-stat-value.net-pos { color: var(--green); }
.report-stat-value.net-neg { color: var(--rose); }

.cat-report-item {
  margin-bottom: 14px;
}
.cat-report-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.cat-report-label { font-size: 13px; color: var(--text2); }
.cat-report-amount { font-family: 'EB Garamond', serif; font-size: 15px; color: var(--text); }
.cat-report-bar { height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; }
.cat-report-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, rgba(192,120,8,0.6), rgba(224,154,24,0.9)); transition: width 0.6s ease; }

.income-report-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.income-report-item:last-child { border-bottom: none; }
.income-report-cat { font-size: 13px; color: var(--text2); }
.income-report-amt { font-family: 'EB Garamond', serif; font-size: 16px; color: var(--green); }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 300;
  display: none;
  align-items: flex-end;
  backdrop-filter: blur(6px);
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: var(--radius) var(--radius) 0 0;
  padding: 24px 20px 44px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
}

.modal-title {
  font-family: 'EB Garamond', serif;
  font-size: 19px;
  font-style: italic;
  color: var(--gold);
  margin-bottom: 20px;
}

.modal-actions { display: flex; gap: 10px; margin-top: 18px; }
.modal-cancel {
  flex: 1; padding: 12px;
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text2);
  font-size: 14px;
  cursor: pointer;
  font-family: 'Noto Serif SC', serif;
}
.modal-confirm {
  flex: 1; padding: 12px;
  background: linear-gradient(135deg, #2850A0, #4878c8);
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Noto Serif SC', serif;
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: #2850A0;
  border: 1px solid rgba(40,80,160,0.4);
  border-radius: 24px;
  padding: 11px 22px;
  font-size: 14px;
  color: #fff;
  z-index: 500;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  white-space: nowrap;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* EMPTY STATE */
.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--text3);
}
.empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.6; }
.empty-text { font-size: 14px; line-height: 1.7; font-style: italic; color: var(--text3); }

/* QUOTE */
.petit-quote {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: 13px;
  color: var(--text2);
  text-align: center;
  padding: 16px;
  line-height: 1.7;
  border-top: 1px solid var(--border);
  margin-top: 8px;
}

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ===== CALENDAR ===== */
.cal-nav {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.cal-month-label {
  font-family: 'EB Garamond', serif;
  font-size: 18px; font-style: italic; color: var(--rose);
}
.cal-nav-btn {
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--card); border: 1px solid var(--border2);
  color: var(--text2); font-size: 17px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.cal-nav-btn:hover { border-color: var(--rose); color: var(--rose); }

.cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 3px; margin-bottom: 14px;
}
.cal-dow {
  text-align: center; font-size: 10px; color: var(--text3);
  letter-spacing: 0.08em; padding: 4px 0 6px;
  text-transform: uppercase;
}
.cal-day {
  aspect-ratio: 1;
  border-radius: 8px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.18s;
  position: relative;
  background: transparent;
  border: 1px solid transparent;
  gap: 1px;
}
.cal-day:hover { background: var(--card2); border-color: var(--border2); }
.cal-day.today { background: #2850A0; border-color: #2850A0; }
.cal-day.today .cal-day-num { color: #fff; font-weight: 600; }
.cal-day.selected { background: var(--card2); border-color: #2850A0; }
.cal-day.other-month { opacity: 0.3; }
.cal-day-num { font-size: 13px; color: var(--text); line-height: 1; }
.cal-day.today .cal-day-num { color: #fff; }
.cal-day-balance { font-size: 9px; line-height: 1; margin-top: 1px; font-family: 'EB Garamond', serif; }
.cal-day-balance.pos { color: var(--green); }
.cal-day-balance.neg { color: var(--rose); }
.cal-day.today .cal-day-balance { color: rgba(255,255,255,0.75); }
.cal-dot-row { display: flex; gap: 2px; justify-content: center; }
.cal-dot {
  width: 4px; height: 4px; border-radius: 50%;
}
.cal-dot.exp { background: var(--rose); }
.cal-dot.inc { background: var(--green); }

.cal-day-detail {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 14px;
  min-height: 80px;
}
.cal-detail-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px;
}
.cal-detail-date {
  font-family: 'EB Garamond', serif;
  font-size: 16px; font-style: italic; color: var(--gold);
}
.cal-detail-totals {
  display: flex; gap: 12px;
}
.cal-detail-stat { font-size: 13px; font-family: 'EB Garamond', serif; }
.cal-detail-stat.exp { color: var(--rose); }
.cal-detail-stat.inc { color: var(--green); }

/* DAILY BUDGET CARD */
.daily-budget-card {
  background: linear-gradient(135deg, #fff8f0, #ffeedd);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 14px;
  position: relative;
  overflow: hidden;
}
.daily-budget-card::before {
  content: '🌟';
  position: absolute; right: 16px; top: 14px;
  font-size: 28px; opacity: 0.3;
}
.daily-budget-title {
  font-size: 11px; color: var(--text3);
  letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px;
}
.daily-budget-row {
  display: flex; gap: 10px; flex-wrap: wrap;
}
.daily-stat {
  flex: 1; min-width: 80px;
  background: rgba(255,255,255,0.7);
  border-radius: 10px; padding: 10px 12px;
  border: 1px solid var(--border);
}
.daily-stat-label { font-size: 10px; color: var(--text3); margin-bottom: 4px; }
.daily-stat-value {
  font-family: 'EB Garamond', serif; font-size: 20px;
}
.daily-stat-value.good { color: var(--green); }
.daily-stat-value.warn { color: var(--gold); }
.daily-stat-value.over { color: var(--rose); }

/* PIGGY BANK */
.piggy-card {
  background: linear-gradient(135deg, #fdf8f0, #faf0e0);

}

}

.piggy-history {

}

.piggy-week-item {

.piggy-week-amt { font-family: 'EB Garamond', serif; font-size: 15px; }

<script>
// ============================================================
// DATA
// ============================================================
const EXP_CATEGORIES = [
  {id:'groceries', label:'买菜', emoji:'🥬'},
  {id:'dining', label:'餐饮', emoji:'🍜'},
  {id:'transport', label:'交通', emoji:'🚇'},
  {id:'shopping', label:'购物', emoji:'🛍️'},
  {id:'entertainment', label:'娱乐', emoji:'🎮'},
  {id:'health', label:'医疗', emoji:'💊'},
  {id:'bills', label:'账单', emoji:'📋'},
  {id:'gift', label:'礼物', emoji:'🎁'},
  {id:'other', label:'其他', emoji:'📦'},
];

const DEFAULT_ACCOUNTS = [
  {id:'cash', name:'现金', type:'cash', balance:0},
  {id:'gift_money', name:'礼金', type:'cash', balance:0},
  {id:'savings', name:'Savings Account', type:'debit', balance:0},
  {id:'debit', name:'Debit Account', type:'debit', balance:0},
  {id:'discover', name:'Discover Credit', type:'credit', balance:0},
  {id:'quicksilver', name:'Quicksilver Credit', type:'credit', balance:0},
  {id:'savor', name:'Savor Credit', type:'credit', balance:0},
];

const DEFAULT_BUDGETS = [
  {id:'family_groceries', name:'家庭买菜', amount:200, period:'weekly'},
  {id:'personal', name:'个人预算', amount:150, period:'weekly'},
];

const DEFAULT_INC_CATS = ['工资','奖金','副业','礼金','报销','其他'];

let data = {
  accounts: [],
  transactions: [],
  budgets: [],
  incCategories: [],
};

let ui = {
  currentExpType: 'expense',
  currentExpCat: 'groceries',
  currentIncCat: '',
  reportMonth: new Date().getMonth(),
  reportYear: new Date().getFullYear(),
};

// ============================================================
// SUPABASE
// ============================================================
const SUPA_URL = 'https://mjqjyztalpbgaiuorplg.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qcWp5enRhbHBiZ2FpdW9ycGxnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3NTgxMzMsImV4cCI6MjA5NTMzNDEzM30.WxADDzcxxbGyojJ0vUThcsQdoGDVYyEzyjYyj8NnNpk';

const supa = {
  async get(table) {
    const r = await fetch(`${SUPA_URL}/rest/v1/${table}?select=*`, {
      headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}` }
    });
    return r.ok ? r.json() : [];
  },
  async upsert(table, rows) {
    await fetch(`${SUPA_URL}/rest/v1/${table}`, {
      method: 'POST',
      headers: {
        apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates'
      },
      body: JSON.stringify(rows)
    });
  },
  async delete(table, id) {
    await fetch(`${SUPA_URL}/rest/v1/${table}?id=eq.${id}`, {
      method: 'DELETE',
      headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}` }
    });
  },
  async deleteAll(table) {
    await fetch(`${SUPA_URL}/rest/v1/${table}?id=neq.___none___`, {
      method: 'DELETE',
      headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}` }
    });
  }
};

function showLoading(msg) {
  let el = document.getElementById('loadingOverlay');
  if (!el) {
    el = document.createElement('div');
    el.id = 'loadingOverlay';
    el.style.cssText = 'position:fixed;inset:0;background:rgba(40,80,160,0.85);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-family:EB Garamond,serif;font-size:18px;font-style:italic;gap:16px;backdrop-filter:blur(4px)';
    el.innerHTML = '<div style="font-size:36px">✦</div><div id="loadingMsg">Loading...</div>';
    document.body.appendChild(el);
  }
  document.getElementById('loadingMsg').textContent = msg || '正在连接星球…';
  el.style.display = 'flex';
}

function hideLoading() {
  const el = document.getElementById('loadingOverlay');
  if (el) el.style.display = 'none';
}

async function load() {
  showLoading('正在连接星球…');
  try {
    // Try loading from Supabase
    const [txs, accs, budgets, settings] = await Promise.all([
      supa.get('pp_transactions'),
      supa.get('pp_accounts'),
      supa.get('pp_budgets'),
      supa.get('pp_settings'),
    ]);

    // Accounts: use defaults if empty
    data.accounts = accs.length > 0 ? accs : DEFAULT_ACCOUNTS.map(a => ({...a}));
    data.transactions = txs || [];
    data.budgets = budgets.length > 0 ? budgets : DEFAULT_BUDGETS.map(b => ({...b}));

    // Income categories from settings
    const incCatSetting = settings.find(s => s.key === 'inc_categories');
    data.incCategories = incCatSetting ? JSON.parse(incCatSetting.value) : [...DEFAULT_INC_CATS];

    // If first time, push defaults to Supabase
    if (accs.length === 0) await supa.upsert('pp_accounts', data.accounts);
    if (budgets.length === 0) await supa.upsert('pp_budgets', data.budgets);
    if (!incCatSetting) await supa.upsert('pp_settings', [{key:'inc_categories', value: JSON.stringify(data.incCategories)}]);

  } catch(e) {
    // Fallback to localStorage
    const saved = localStorage.getItem('pp_budget_v2');
    if (saved) { const d = JSON.parse(saved); Object.assign(data, d); }
    else {
      data.accounts = DEFAULT_ACCOUNTS.map(a => ({...a}));
      data.transactions = [];
      data.budgets = DEFAULT_BUDGETS.map(b => ({...b}));
      data.incCategories = [...DEFAULT_INC_CATS];
    }
  }

  if (!data.incCategories || !data.incCategories.length) data.incCategories = [...DEFAULT_INC_CATS];
  if (!data.budgets || !data.budgets.length) data.budgets = DEFAULT_BUDGETS.map(b => ({...b}));
  ui.currentIncCat = data.incCategories[0] || '工资';
  hideLoading();
}

async function save() {
  // Always save to localStorage as backup
  localStorage.setItem('pp_budget_v2', JSON.stringify(data));
  // Save to Supabase in background (don't await)
  try {
    await Promise.all([
      supa.upsert('pp_accounts', data.accounts),
      supa.upsert('pp_budgets', data.budgets),
      supa.upsert('pp_settings', [{key:'inc_categories', value: JSON.stringify(data.incCategories)}]),
    ]);
  } catch(e) { console.warn('Supabase save failed, localStorage backup used'); }
}

async function saveTx(tx) {
  localStorage.setItem('pp_budget_v2', JSON.stringify(data));
  try { await supa.upsert('pp_transactions', [tx]); }
  catch(e) { console.warn('Supabase tx save failed'); }
}

async function deleteTxRemote(id) {
  localStorage.setItem('pp_budget_v2', JSON.stringify(data));
  try { await supa.delete('pp_transactions', id); }
  catch(e) { console.warn('Supabase delete failed'); }
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,6);
}

// ============================================================
// RENDER
// ============================================================
function render() {
  renderHeader();
  renderOverview();
  renderExpensePage();
  renderIncomePage();
  renderAccountsPage();
  renderReport();
}

function renderHeader() {
  const now = new Date();
  const days = ['日','一','二','三','四','五','六'];
  document.getElementById('headerDate').innerHTML =
    `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}<br>星期${days[now.getDay()]}`;
}

function renderOverview() {
  const now = new Date();
  const mTxs = data.transactions.filter(t => {
    const d = new Date(t.date);
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  });

  let inc = 0, exp = 0;
  mTxs.forEach(t => {
    if (t.type === 'income') inc += t.amount;
    else if (t.type === 'expense') exp += t.amount;
  });
  const net = inc - exp;

  document.getElementById('overviewMonth').textContent =
    `${now.getFullYear()}年${now.getMonth()+1}月`;

  const netEl = document.getElementById('overviewNet');
  netEl.innerHTML = `<span>$ </span>${Math.abs(net).toFixed(2)}`;
  netEl.className = 'overview-net' + (net >= 0 ? ' positive' : ' negative');
  if (net < 0) netEl.innerHTML = `<span>-$ </span>${Math.abs(net).toFixed(2)}`;

  document.getElementById('overviewInc').textContent = `$${inc.toFixed(0)}`;
  document.getElementById('overviewExp').textContent = `$${exp.toFixed(0)}`;
  document.getElementById('overviewCount').textContent = mTxs.length;

  // Accounts
  const accEl = document.getElementById('overviewAccounts');
  accEl.innerHTML = data.accounts.map(a => {
    const b = parseFloat(a.balance);
    const cls = b > 0 ? 'pos' : (b < 0 ? 'neg' : 'zero');
    const typeLabel = {cash:'现金',debit:'储蓄卡',credit:'信用卡'}[a.type] || a.type;
    return `<div class="account-chip" onclick="goTo('accounts')">
      <div class="account-chip-type">${typeLabel}</div>
      <div class="account-chip-name">${a.name}</div>
      <div class="account-chip-balance ${cls}">$${Math.abs(b).toFixed(2)}</div>
    </div>`;
  }).join('');

  // Budgets
  const budgetEl = document.getElementById('overviewBudgets');
  const weekStart = getWeekStart();
  budgetEl.innerHTML = data.budgets.map(b => {
    const spent = data.transactions
      .filter(t => t.type === 'expense' && t.budget_id === b.id && new Date(t.date) >= weekStart)
      .reduce((s,t) => s + t.amount, 0);
    const pct = Math.min(spent / b.amount * 100, 100);
    const fillCls = pct < 70 ? 'safe' : (pct < 100 ? 'warn' : 'over');
    return `<div class="budget-card">
      <div class="budget-card-header">
        <div>
          <div class="budget-card-name">${b.name}</div>
          <div class="budget-card-meta">每周 $${b.amount}</div>
        </div>
        <div class="budget-card-amounts">
          <div class="budget-card-spent">$${spent.toFixed(0)}</div>
          <div class="budget-card-total">/ $${b.amount}</div>
        </div>
      </div>
      <div class="budget-track"><div class="budget-fill ${fillCls}" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');

  // Recent txs
  const recent = [...data.transactions]
    .sort((a,b) => new Date(b.date) - new Date(a.date))
    .slice(0, 8);
  document.getElementById('overviewTxList').innerHTML =
    recent.length ? recent.map(t => renderTxItem(t)).join('') :
    `<div class="empty-state"><div class="empty-icon">🌙</div><div class="empty-text">还没有任何记录<br>从支出或收入页面开始吧</div></div>`;
}

function renderExpensePage() {
  // Categories
  const expWrap = document.getElementById('expCatWrap');
  expWrap.innerHTML = EXP_CATEGORIES.map(c =>
    `<div class="cat-pill ${ui.currentExpCat === c.id ? 'active' : ''}" onclick="setExpCat('${c.id}')">${c.emoji} ${c.label}</div>`
  ).join('');

  // Account selects
  const allAccOpts = data.accounts.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
  const creditOpts = data.accounts.filter(a=>a.type==='credit').map(a => `<option value="${a.id}">${a.name}</option>`).join('');
  const nonCreditOpts = data.accounts.filter(a=>a.type!=='credit').map(a => `<option value="${a.id}">${a.name}</option>`).join('');

  document.getElementById('expAccount').innerHTML = allAccOpts;
  document.getElementById('trfFrom').innerHTML = allAccOpts;
  document.getElementById('trfTo').innerHTML = allAccOpts;
  document.getElementById('payFrom').innerHTML = nonCreditOpts || allAccOpts;
  document.getElementById('payTo').innerHTML = creditOpts || allAccOpts;

  // Tx list
  const txs = [...data.transactions]
    .filter(t => t.type === 'expense' || t.type === 'transfer' || t.type === 'payment')
    .sort((a,b) => new Date(b.date) - new Date(a.date));
  document.getElementById('expTxList').innerHTML =
    txs.length ? renderGroupedTxs(txs) :
    `<div class="empty-state"><div class="empty-icon">🌹</div><div class="empty-text">还没有支出记录</div></div>`;
}

function renderIncomePage() {
  const incWrap = document.getElementById('incCatWrap');
  incWrap.innerHTML = data.incCategories.map(c =>
    `<div class="cat-pill ${ui.currentIncCat === c ? 'active' : ''}" onclick="setIncCat('${c}')">${c}</div>`
  ).join('');

  const accOpts = data.accounts.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
  document.getElementById('incAccount').innerHTML = accOpts;

  const txs = [...data.transactions]
    .filter(t => t.type === 'income')
    .sort((a,b) => new Date(b.date) - new Date(a.date));
  document.getElementById('incTxList').innerHTML =
    txs.length ? renderGroupedTxs(txs) :
    `<div class="empty-state"><div class="empty-icon">✨</div><div class="empty-text">还没有收入记录</div></div>`;
}

function renderAccountsPage() {
  const el = document.getElementById('accountsFullGrid');
  el.innerHTML = data.accounts.map(a => {
    const b = parseFloat(a.balance);
    const cls = b > 0 ? 'pos' : (b < 0 ? 'neg' : 'zero');
    const typeLabel = {cash:'现金',debit:'储蓄卡',credit:'信用卡'}[a.type] || a.type;
    return `<div class="account-full-card">
      <div class="acc-full-type">${typeLabel}</div>
      <div class="acc-full-name">${a.name}</div>
      <div class="acc-full-balance ${cls}">$${b < 0 ? '-' : ''}${Math.abs(b).toFixed(2)}</div>
      <div class="acc-edit-btn" onclick="openEditAcc('${a.id}')">编辑余额</div>
    </div>`;
  }).join('');
}

function renderReport() {
  const y = ui.reportYear, m = ui.reportMonth;
  document.getElementById('reportMonthLabel').textContent = `${y}年${m+1}月`;

  const txs = data.transactions.filter(t => {
    const d = new Date(t.date);
    return d.getFullYear() === y && d.getMonth() === m;
  });

  let inc = 0, exp = 0;
  const expByCat = {}, incByCat = {};

  txs.forEach(t => {
    if (t.type === 'income') {
      inc += t.amount;
      incByCat[t.category] = (incByCat[t.category] || 0) + t.amount;
    } else if (t.type === 'expense') {
      exp += t.amount;
      expByCat[t.category] = (expByCat[t.category] || 0) + t.amount;
    }
  });

  const net = inc - exp;
  document.getElementById('rptInc').textContent = `$${inc.toFixed(2)}`;
  document.getElementById('rptExp').textContent = `$${exp.toFixed(2)}`;
  const netEl = document.getElementById('rptNet');
  netEl.textContent = `${net >= 0 ? '+' : '-'}$${Math.abs(net).toFixed(2)}`;
  netEl.className = `report-stat-value ${net >= 0 ? 'net-pos' : 'net-neg'}`;
  document.getElementById('rptCount').textContent = txs.length;

  const maxExp = Math.max(...Object.values(expByCat), 1);
  const expSorted = Object.entries(expByCat).sort((a,b) => b[1]-a[1]);
  const expEl = document.getElementById('rptExpCats');
  expEl.innerHTML = expSorted.length ? expSorted.map(([catId, amt]) => {
    const cat = EXP_CATEGORIES.find(c => c.id === catId) || {emoji:'📦', label: catId};
    const pct = (amt / maxExp * 100).toFixed(1);
    return `<div class="cat-report-item">
      <div class="cat-report-header">
        <div class="cat-report-label">${cat.emoji} ${cat.label}</div>
        <div class="cat-report-amount">$${amt.toFixed(2)}</div>
      </div>
      <div class="cat-report-bar"><div class="cat-report-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('') : `<div class="empty-text" style="padding:16px">本月无支出</div>`;

  const incEl = document.getElementById('rptIncCats');
  incEl.innerHTML = Object.entries(incByCat).length ? Object.entries(incByCat)
    .sort((a,b)=>b[1]-a[1])
    .map(([cat, amt]) => `<div class="income-report-item">
      <div class="income-report-cat">${cat}</div>
      <div class="income-report-amt">+$${amt.toFixed(2)}</div>
    </div>`).join('') : `<div class="empty-text" style="padding:16px">本月无收入</div>`;
}

function renderGroupedTxs(txs) {
  const groups = {};
  txs.forEach(t => {
    const key = t.date.slice(0,10);
    if (!groups[key]) groups[key] = [];
    groups[key].push(t);
  });
  return Object.entries(groups).map(([date, items]) =>
    `<div class="date-divider">${formatDate(date)}</div>` +
    items.map(t => renderTxItem(t)).join('')
  ).join('');
}

function renderTxItem(t) {
  let emoji = '📦', label = '', amtCls = 'exp', sign = '-';

  if (t.type === 'expense') {
    const cat = EXP_CATEGORIES.find(c => c.id === t.category);
    emoji = cat ? cat.emoji : '📦';
    label = cat ? cat.label : t.category;
    amtCls = 'exp'; sign = '-';
  } else if (t.type === 'income') {
    emoji = '✨';
    label = t.category;
    amtCls = 'inc'; sign = '+';
  } else if (t.type === 'transfer') {
    emoji = '↔️'; label = '转账';
    amtCls = 'trf'; sign = '';
  } else if (t.type === 'payment') {
    emoji = '💳'; label = '还款';
    amtCls = 'pay'; sign = '';
  }

  const fromAcc = t.from_account ? data.accounts.find(a=>a.id===t.from_account) : null;
  const toAcc = t.to_account ? data.accounts.find(a=>a.id===t.to_account) : null;
  const accName = fromAcc && toAcc ? `${fromAcc.name} → ${toAcc.name}` :
    (t.account_id ? (data.accounts.find(a=>a.id===t.account_id)||{}).name || '' : '');

  return `<div class="tx-item">
    <div class="tx-icon" style="background:rgba(160,80,30,0.06)">${emoji}</div>
    <div class="tx-body">
      <div class="tx-note">${t.note || label}</div>
      <div class="tx-meta">${label}${accName ? ' · '+accName : ''}</div>
    </div>
    <div class="tx-right">
      <div class="tx-amount ${amtCls}">${sign}$${parseFloat(t.amount).toFixed(2)}</div>
    </div>
    <button class="tx-del" onclick="deleteTx('${t.id}')">×</button>
  </div>`;
}

function submitExpense() {
  const type = ui.currentExpType;

  if (type === 'expense') {
    const amount = parseFloat(document.getElementById('expAmount').value);
    if (!amount || amount <= 0) { showToast('请输入金额'); return; }
    const accId = document.getElementById('expAccount').value;
    const acc = data.accounts.find(a => a.id === accId);

    const tx = {
      id: uid(), type: 'expense', amount,
      category: ui.currentExpCat,
      account_id: accId,
      note: document.getElementById('expNote').value.trim(),
      date: document.getElementById('expDate').value || today(),
      budget_id: getBudgetIdForCat(ui.currentExpCat),
    };
    data.transactions.push(tx);
    saveTx(tx);
    if (acc) {
      // For credit cards, spending increases the balance owed (shown as negative)
      if (acc.type === 'credit') acc.balance = (parseFloat(acc.balance) - amount).toFixed(2);
      else acc.balance = (parseFloat(acc.balance) - amount).toFixed(2);
    }
    document.getElementById('expAmount').value = '';
    document.getElementById('expNote').value = '';

  } else if (type === 'transfer') {
    const amount = parseFloat(document.getElementById('trfAmount').value);
    if (!amount || amount <= 0) { showToast('请输入金额'); return; }
    const fromId = document.getElementById('trfFrom').value;
    const toId = document.getElementById('trfTo').value;
    if (fromId === toId) { showToast('转出和转入不能是同一账户'); return; }

    const fromAcc = data.accounts.find(a=>a.id===fromId);
    const toAcc = data.accounts.find(a=>a.id===toId);

    const trfTx = {
      id: uid(), type: 'transfer', amount,
      from_account: fromId, to_account: toId,
      note: document.getElementById('trfNote').value.trim() || '转账',
      date: document.getElementById('trfDate').value || today(),
    };
    data.transactions.push(trfTx);
    saveTx(trfTx);
    if (fromAcc) fromAcc.balance = (parseFloat(fromAcc.balance) - amount).toFixed(2);
    if (toAcc) toAcc.balance = (parseFloat(toAcc.balance) + amount).toFixed(2);
    document.getElementById('trfAmount').value = '';
    document.getElementById('trfNote').value = '';

  } else if (type === 'payment') {
    const amount = parseFloat(document.getElementById('payAmount').value);
    if (!amount || amount <= 0) { showToast('请输入还款金额'); return; }
    const fromId = document.getElementById('payFrom').value;
    const toId = document.getElementById('payTo').value;

    const fromAcc = data.accounts.find(a=>a.id===fromId);
    const toAcc = data.accounts.find(a=>a.id===toId);

    const payTx = {
      id: uid(), type: 'payment', amount,
      from_account: fromId, to_account: toId,
      note: document.getElementById('payNote').value.trim() || `还款 · ${toAcc?.name || ''}`,
      date: document.getElementById('payDate').value || today(),
    };
    data.transactions.push(payTx);
    saveTx(payTx);
    if (fromAcc) fromAcc.balance = (parseFloat(fromAcc.balance) - amount).toFixed(2);
    if (toAcc) toAcc.balance = (parseFloat(toAcc.balance) + amount).toFixed(2); // credit balance improves
    document.getElementById('payAmount').value = '';
    document.getElementById('payNote').value = '';
  }

  save();
  render();
  showToast('✦ 已记录');
}

function submitIncome() {
  const amount = parseFloat(document.getElementById('incAmount').value);
  if (!amount || amount <= 0) { showToast('请输入金额'); return; }
  if (!ui.currentIncCat) { showToast('请选择分类'); return; }

  };

  document.getElementById('incAmount').value = '';
  document.getElementById('incNote').value = '';
  save();
  render();
  showToast('✦ 已记录');
}

function deleteTx(id) {
  const tx = data.transactions.find(t=>t.id===id);
  if (!tx) return;

  // Reverse balance
  if (tx.type === 'expense') {
    const acc = data.accounts.find(a=>a.id===tx.account_id);
    if (acc) acc.balance = (parseFloat(acc.balance) + tx.amount).toFixed(2);
  } else if (tx.type === 'income') {
    const acc = data.accounts.find(a=>a.id===tx.account_id);
    if (acc) acc.balance = (parseFloat(acc.balance) - tx.amount).toFixed(2);
  } else if (tx.type === 'transfer' || tx.type === 'payment') {
    const from = data.accounts.find(a=>a.id===tx.from_account);
    const to = data.accounts.find(a=>a.id===tx.to_account);
    if (from) from.balance = (parseFloat(from.balance) + tx.amount).toFixed(2);
    if (to) to.balance = (parseFloat(to.balance) - tx.amount).toFixed(2);
  }

  data.transactions = data.transactions.filter(t=>t.id!==id);
  deleteTxRemote(id);
  save();
  render();
  showToast('已删除');
}

function getWeekStart() {
  const now = new Date();
  const d = new Date(now);
  d.setDate(now.getDate() - now.getDay());
  d.setHours(0,0,0,0);
  return d;
}

function formatDate(s) {
  const d = new Date(s);
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const target = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const diff = Math.round((today - target) / 86400000);
  if (diff === 0) return '今天';
  if (diff === 1) return '昨天';
  if (diff === 2) return '前天';
  return `${d.getMonth()+1}月${d.getDate()}日`;
}

function renderDailyBudget() {
  const el = document.getElementById('dailyBudgetRow');
  const todayStr = today();
  const weekStart = getWeekStart();

  el.innerHTML = data.budgets.map(b => {
    const weekSpent = data.transactions
      .filter(t => t.type === 'expense' && t.budget_id === b.id && new Date(t.date) >= weekStart)
      .reduce((s,t) => s + t.amount, 0);

    const dayOfWeek = new Date().getDay(); // 0=Sun
    const daysElapsed = dayOfWeek === 0 ? 0 : dayOfWeek;
    const daysLeft = 7 - daysElapsed;
    const budgetUsedSoFar = b.amount * (daysElapsed / 7);
    const dailyBudget = b.amount / 7;

    const todaySpent = data.transactions
      .filter(t => t.type === 'expense' && t.budget_id === b.id && t.date.slice(0,10) === todayStr)
      .reduce((s,t) => s + t.amount, 0);

    const remaining = dailyBudget - todaySpent;
    const cls = remaining > dailyBudget * 0.5 ? 'good' : (remaining > 0 ? 'warn' : 'over');

    return `<div class="daily-stat">
      <div class="daily-stat-label">${b.name}</div>
      <div class="daily-stat-value ${cls}">$${Math.abs(remaining).toFixed(0)}${remaining < 0 ? '↑' : ''}</div>
      <div style="font-size:10px;color:var(--text3);margin-top:2px">今日可用 $${dailyBudget.toFixed(0)}</div>
    </div>`;
  }).join('') || '<div style="color:var(--text3);font-size:13px">还没有设置预算</div>';
}

function getWeekRanges() {
  // Returns all completed week ranges (Sun–Sat) from year start to last week
  const now = new Date();
  const weeks = [];
  let cursor = new Date(now.getFullYear(), 0, 1);
  cursor.setDate(cursor.getDate() - cursor.getDay()); // align to Sunday

  while (cursor <= now) {
    const wStart = new Date(cursor);
    const wEnd = new Date(cursor);
    wEnd.setDate(wEnd.getDate() + 6);
    wEnd.setHours(23,59,59,999);
    const isCurrentWeek = wStart <= now && wEnd >= now;
    if (!isCurrentWeek) weeks.push({ wStart, wEnd });
    cursor.setDate(cursor.getDate() + 7);
  }
  return weeks;
}

function getBudgetById(id) {
  return data.budgets.find(b => b.id === id);
}

function weekSpentForBudget(budgetId, wStart, wEnd) {
  return data.transactions
    .filter(t => t.type === 'expense' && t.budget_id === budgetId)
    .filter(t => { const d = new Date(t.date); return d >= wStart && d <= wEnd; })
    .reduce((s,t) => s + t.amount, 0);
}

function renderPiggyBank() {
  const weeks = getWeekRanges();

  // Find the two main budget IDs
  const groceryBudget = data.budgets.find(b => b.id === 'family_groceries') || data.budgets.find(b => b.name.includes('买菜'));
  const personalBudget = data.budgets.find(b => b.id === 'personal') || data.budgets.find(b => b.name.includes('个人'));

  // Per-budget weekly savings
  let groceryTotal = 0, personalTotal = 0;
  const weekRows = weeks.map(({wStart, wEnd}) => {
    const label = `${wStart.getMonth()+1}/${wStart.getDate()} – ${wEnd.getMonth()+1}/${wEnd.getDate()}`;
    let grocerySaved = 0, personalSaved = 0, otherSaved = 0;

    if (groceryBudget) {
      const spent = weekSpentForBudget(groceryBudget.id, wStart, wEnd);
      // Only count as saved if we actually spent something OR it's a non-zero week
      const hasActivity = data.transactions.some(t => {
        const d = new Date(t.date); return d >= wStart && d <= wEnd;
      });
      if (hasActivity) grocerySaved = groceryBudget.amount - spent;
    }
    if (personalBudget) {
      const spent = weekSpentForBudget(personalBudget.id, wStart, wEnd);
      const hasActivity = data.transactions.some(t => {
        const d = new Date(t.date); return d >= wStart && d <= wEnd;
      });
      if (hasActivity) personalSaved = personalBudget.amount - spent;
    }
    // Other budgets
    data.budgets.forEach(b => {
      if (b.id !== groceryBudget?.id && b.id !== personalBudget?.id) {
        const spent = weekSpentForBudget(b.id, wStart, wEnd);
        const hasActivity = data.transactions.some(t => {
          const d = new Date(t.date); return d >= wStart && d <= wEnd;
        });
        if (hasActivity) otherSaved += b.amount - spent;
      }
    });

    if (groceryBudget) groceryTotal += Math.max(grocerySaved, 0);
    if (personalBudget) personalTotal += Math.max(personalSaved, 0);

    return { label, grocerySaved, personalSaved, otherSaved };
  });

  // Update totals
  const groceryEl = document.getElementById('grocerySaved');
  const personalEl = document.getElementById('personalSaved');
  if (groceryEl) groceryEl.innerHTML = `<span style="font-size:14px">$ </span>${groceryTotal.toFixed(2)}`;
  if (personalEl) personalEl.innerHTML = `<span style="font-size:14px">$ </span>${personalTotal.toFixed(2)}`;

  // Stars for grocery: 1 star per completed week with savings
  const groceryWeeksWithSavings = weekRows.filter(w => w.grocerySaved > 0).length;
  const starsEl = document.getElementById('groceryStars');
  if (starsEl) starsEl.textContent = groceryWeeksWithSavings > 0 ? '⭐'.repeat(Math.min(groceryWeeksWithSavings, 10)) : '—';

  // Roses for personal: 1 rose per completed week with savings
  const personalWeeksWithSavings = weekRows.filter(w => w.personalSaved > 0).length;
  const rosesEl = document.getElementById('personalRoses');
  if (rosesEl) rosesEl.textContent = personalWeeksWithSavings > 0 ? '🌹'.repeat(Math.min(personalWeeksWithSavings, 10)) : '—';

  // Weekly history
  const histEl = document.getElementById('piggyHistory');
  const recent = weekRows.slice(-8).reverse();
  if (recent.length === 0 || !recent.some(w => w.grocerySaved !== 0 || w.personalSaved !== 0)) {
    histEl.innerHTML = '<div style="color:var(--text3);font-size:13px;text-align:center;padding:12px;font-style:italic">记录第一周后这里会显示明细</div>';
    return;
  }

  histEl.innerHTML = recent.map(w => {
    const gSign = w.grocerySaved >= 0 ? '+' : '';
    const pSign = w.personalSaved >= 0 ? '+' : '';
    const gCls = w.grocerySaved >= 0 ? 'saved' : 'over';
    const pCls = w.personalSaved >= 0 ? 'saved' : 'over';
    return `<div class="piggy-week-item" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;align-items:center">
      <div class="piggy-week-label">${w.label}</div>
      <div class="piggy-week-amt ${gCls}" style="text-align:center;font-size:13px">${gSign}$${w.grocerySaved.toFixed(0)}<span style="font-size:10px;color:var(--text3);margin-left:2px">🥬</span></div>
      <div class="piggy-week-amt ${pCls}" style="text-align:right;font-size:13px">${pSign}$${w.personalSaved.toFixed(0)}<span style="font-size:10px;color:var(--text3);margin-left:2px">🌹</span></div>
    </div>`;
  }).join('');
}

function renderCalendar() {
  const y = calState.year, m = calState.month;
  document.getElementById('calMonthLabel').textContent = `${y}年${m+1}月`;

  const grid = document.getElementById('calGrid');
  const dows = ['日','一','二','三','四','五','六'];
  let html = dows.map(d => `<div class="cal-dow">${d}</div>`).join('');

  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const daysInPrev = new Date(y, m, 0).getDate();
  const todayStr = today();

  // Build tx map for this month
  const txMap = {};
  data.transactions.forEach(t => {
    const d = t.date.slice(0,10);
    if (!txMap[d]) txMap[d] = {exp:0, inc:0};
    if (t.type === 'expense') txMap[d].exp += t.amount;
    else if (t.type === 'income') txMap[d].inc += t.amount;
  });

  // Prev month padding
  for (let i = firstDay - 1; i >= 0; i--) {
    const day = daysInPrev - i;
    html += `<div class="cal-day other-month"><div class="cal-day-num">${day}</div></div>`;
  }

  // Current month
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = dateStr === todayStr;
    const isSel = dateStr === calState.selectedDate;
    const dayData = txMap[dateStr];

    let balanceHtml = '';
    if (dayData) {
      const net = dayData.inc - dayData.exp;
      const balCls = net >= 0 ? 'pos' : 'neg';
      const sign = net >= 0 ? '+' : '';
      balanceHtml = `<div class="cal-day-balance ${balCls}">${sign}${Math.abs(net) < 100 ? net.toFixed(0) : Math.round(net/10)*10/10}</div>`;
    }

    html += `<div class="cal-day ${isToday?'today':''} ${isSel&&!isToday?'selected':''}" onclick="selectCalDay('${dateStr}')">
      <div class="cal-day-num">${d}</div>
      ${balanceHtml}
    </div>`;
  }

  // Next month padding
  const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;
  let nextDay = 1;
  for (let i = firstDay + daysInMonth; i < totalCells; i++) {
    html += `<div class="cal-day other-month"><div class="cal-day-num">${nextDay++}</div></div>`;
  }

  grid.innerHTML = html;

  // Re-render day detail if selected
  if (calState.selectedDate) selectCalDay(calState.selectedDate, true);
}

function selectCalDay(dateStr, silent) {
  calState.selectedDate = dateStr;
  if (!silent) renderCalendar();

  const txs = data.transactions.filter(t => t.date.slice(0,10) === dateStr);
  const exp = txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const inc = txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);

  const d = new Date(dateStr);
  const dateLabel = `${d.getMonth()+1}月${d.getDate()}日`;

  const detail = document.getElementById('calDayDetail');
  if (txs.length === 0) {
    detail.innerHTML = `<div class="cal-detail-header">
      <div class="cal-detail-date">${dateLabel}</div>
    </div>
    <div style="color:var(--text3);font-size:13px;font-style:italic;text-align:center;padding:8px">这天没有记录</div>`;
    return;
  }

  detail.innerHTML = `<div class="cal-detail-header">
    <div class="cal-detail-date">${dateLabel}</div>
    <div class="cal-detail-totals">
      ${exp > 0 ? `<div class="cal-detail-stat exp">-$${exp.toFixed(2)}</div>` : ''}
      ${inc > 0 ? `<div class="cal-detail-stat inc">+$${inc.toFixed(2)}</div>` : ''}
    </div>
  </div>
  <div class="tx-list">${txs.map(t => renderTxItem(t)).join('')}</div>`;
}

function changeCalMonth(delta) {
  calState.month += delta;
  if (calState.month < 0) { calState.month = 11; calState.year--; }
  if (calState.month > 11) { calState.month = 0; calState.year++; }
  renderCalendar();
}

initStars();
document.getElementById('expDate').value = today();
document.getElementById('incDate').value = today();
document.getElementById('trfDate').value = today();
document.getElementById('payDate').value = today();
load().then(() => render());
</script>
